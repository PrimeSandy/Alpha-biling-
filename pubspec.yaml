name: billsplit
description: BillSplit Flutter app for smart bill sharing.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  image_picker: ^1.0.7
  http: ^1.2.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.1
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.1.0
  flutter_image_compress: ^2.1.0
  shared_preferences: ^2.2.2
  google_generative_ai: ^0.4.3



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
